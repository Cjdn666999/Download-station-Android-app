<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中考体育成绩查询</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [currentPage, setCurrentPage] = useState('query');
            const [name, setName] = useState('');
            const [queryName, setQueryName] = useState('');
            const [studentData, setStudentData] = useState(null);

            const studentDatabase = {
                '倪钰翔': {
                    id: '为了隐私问题 暂不显示',
                    name: '倪钰翔',
                    score800: 7.5,
                    scoreJump: 14,
                    scoreRope: 18.5,
                    total: 38
                },
                '高梓玄': {
                    id: '370481201012284237',
                    name: '高梓玄',
                    score800: 5,
                    scoreJump: 4,
                    scoreRope: 12.6,
                    total: 22
                },
                '任衍硕': {
                    id: '为了隐私问题 暂不显示',
                    name: '任衍硕',
                    score800: 9.9,
                    scoreJump: 10,
                    scoreRope: 15,
                    total: 34.9
                },
                '李昊': {
                    id: '为了隐私问题 暂不显示',
                    name: '李昊',
                    score800: '?',
                    scoreJump: '?',
                    scoreRope: '?',
                    total: '太强了 不显示'
                }
            };

            const handleQuery = () => {
                setQueryName(name);
                const data = studentDatabase[name] || {
                    id: '为了隐私问题 暂不显示',
                    name: name,
                    score800: 'BigInt 404',
                    scoreJump: 'BigInt 404',
                    scoreRope: 'BigInt 404',
                    total: 'BigInt 404'
                };
                setStudentData(data);
                setCurrentPage('result');
            };

            const handleBack = () => {
                setCurrentPage('query');
                setName('');
                setStudentData(null);
            };

            if (currentPage === 'query') {
                return (
                    <div className="min-h-screen bg-gray-100">
                        {/* 蓝色顶部标题栏 */}
                        <div className="bg-blue-600 text-white py-8 px-4">
                            <h1 className="text-2xl font-bold text-center">
                                滕州市2026年中考体育与健康成绩查询
                            </h1>
                        </div>

                        {/* 查询表单 */}
                        <div className="max-w-md mx-auto mt-8 px-4">
                            <p className="text-gray-700 mb-6 text-center">请输入正确的查询条件进行查询</p>
                            
                            <div className="space-y-4">
                                {/* 身份证号输入框（模糊处理） */}
                                <div className="relative">
                                    <input 
                                        type="text" 
                                        className="w-full px-4 py-3 border border-gray-300 rounded-lg bg-gray-200"
                                        placeholder=""
                                        disabled
                                    />
                                    <div className="absolute inset-0 flex items-center px-4">
                                        <div className="w-full h-6 bg-gray-400 rounded"></div>
                                    </div>
                                </div>

                                {/* 姓名输入框 */}
                                <div>
                                    <label className="block text-gray-700 mb-2 font-medium">姓名</label>
                                    <input 
                                        type="text" 
                                        className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                        placeholder="请输入姓名"
                                        value={name}
                                        onChange={(e) => setName(e.target.value)}
                                    />
                                </div>

                                {/* 查询按钮 */}
                                <button 
                                    onClick={handleQuery}
                                    className="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded-lg transition duration-200"
                                >
                                    查询
                                </button>
                            </div>

                            {/* 查询必读 */}
                            <div className="mt-8 text-center">
                                <p className="text-gray-600">查询必读</p>
                            </div>
                        </div>

                        {/* 底部导航 */}
                        <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 px-4 py-3">
                            <div className="flex justify-center space-x-6 text-blue-500">
                                <span>分享好友</span>
                                <span>我的保存</span>
                                <span>订阅通知</span>
                            </div>
                            <div className="text-center mt-2 text-gray-500 text-sm">
                                本查询使用 <span className="text-blue-500">易查分</span> 制作，免费制作查询 &gt;
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gray-100">
                    {/* 查询结果页面 */}
                    <div className="max-w-md mx-auto mt-8 px-4">
                        <h2 className="text-2xl font-bold text-center mb-6">查询结果</h2>
                        
                        {/* 成绩表格 */}
                        <div className="bg-white rounded-lg shadow overflow-hidden">
                            <table className="w-full">
                                <tbody>
                                    <tr className="border-b">
                                        <td className="px-4 py-3 bg-blue-50 font-medium">身份证号</td>
                                        <td className="px-4 py-3">{studentData.id}</td>
                                    </tr>
                                    <tr className="border-b">
                                        <td className="px-4 py-3 bg-blue-50 font-medium">姓名</td>
                                        <td className="px-4 py-3">{studentData.name}</td>
                                    </tr>
                                    <tr className="border-b">
                                        <td className="px-4 py-3 bg-blue-50 font-medium">800米/1000米</td>
                                        <td className="px-4 py-3">{studentData.score800}</td>
                                    </tr>
                                    <tr className="border-b">
                                        <td className="px-4 py-3 bg-blue-50 font-medium">立定跳远</td>
                                        <td className="px-4 py-3">{studentData.scoreJump}</td>
                                    </tr>
                                    <tr className="border-b">
                                        <td className="px-4 py-3 bg-blue-50 font-medium">实心球成绩</td>
                                        <td className="px-4 py-3">0</td>
                                    </tr>
                                    <tr className="border-b">
                                        <td className="px-4 py-3 bg-blue-50 font-medium">跳绳成绩</td>
                                        <td className="px-4 py-3">{studentData.scoreRope}</td>
                                    </tr>
                                    <tr className="border-b">
                                        <td className="px-4 py-3 bg-blue-50 font-medium">篮球运球</td>
                                        <td className="px-4 py-3">0</td>
                                    </tr>
                                    <tr>
                                        <td className="px-4 py-3 bg-blue-50 font-medium">总分</td>
                                        <td className="px-4 py-3 font-bold">{studentData.total}</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        {/* 联系我们 */}
                        <div className="mt-6 text-center">
                            <p className="text-blue-500">对查询结果有疑问请联系我们</p>
                        </div>

                        {/* 公众号二维码 */}
                        <div className="mt-6 bg-gray-100 rounded-lg p-6 text-center">
                            <h3 className="font-medium mb-2">长按关注查询公众号</h3>
                            <p className="text-gray-600 text-sm mb-4">快速进入查询 保存结果 接收通知</p>
                            <div className="flex justify-center">
                                <img 
                                    src="https://placehold.co/120x120/000000/FFFFFF?text=QR" 
                                    alt="微信公众号二维码" 
                                    className="w-30 h-30"
                                />
                            </div>
                        </div>

                        {/* 返回按钮 */}
                        <div className="mt-8 text-center">
                            <button 
                                onClick={handleBack}
                                className="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-8 rounded-lg transition duration-200"
                            >
                                点击返回到查询页面
                            </button>
                        </div>

                        {/* 底部导航 */}
                        <div className="mt-8 flex justify-between items-center">
                            <div className="flex items-center space-x-2">
                                <i className="fas fa-lock text-gray-600"></i>
                                <span className="text-gray-600">锁定</span>
                            </div>
                            <div className="flex items-center space-x-2">
                                <i className="fas fa-share text-gray-600"></i>
                                <span className="text-gray-600">分享</span>
                            </div>
                            <button className="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded">
                                保存
                            </button>
                        </div>

                        {/* 底部信息 */}
                        <div className="mt-4 text-center text-blue-500">
                            发成绩用易查分 &gt;
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
